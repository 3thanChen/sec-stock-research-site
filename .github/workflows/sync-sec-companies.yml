name: Sync SEC Companies

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run SEC sync
        run: python sync-sec-companies.py

      - name: Commit updated company file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/company_tickers.json
          git commit -m "Sync SEC company tickers" || echo "No changes"
          git push
