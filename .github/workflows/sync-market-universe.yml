name: Sync Market Universe

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Build SEC + Finnhub matched universe
        run: python scripts/sync-market-universe.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Commit market universe
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/market_universe.json
          git commit -m "Update SEC Finnhub market universe" || echo "No changes"
          git push
