name: Sync Finnhub

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python scripts/sync-finnhub.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/finnhub
          git commit -m "Update Finnhub Data" || echo "No changes"
          git push
