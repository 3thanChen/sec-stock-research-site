<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SEC Company Screener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SEC Company Screener</h1>
  <input id="searchInput" placeholder="Search ticker, company, or CIK...">
</header>

<main>
  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Company</th>
        <th>CIK</th>
        <th>Open</th>
      </tr>
    </thead>
    <tbody id="companyTable"></tbody>
  </table>
</main>

<script src="script.js"></script>

</body>
</html>
