<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEC Stock Research</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>SEC Stock Research</h1>
      <p>Compact public-company screener powered by synced SEC data.</p>
    </div>
    <div class="status" id="status">Loading…</div>
  </header>

  <main>
    <section class="controls">
      <input id="searchInput" type="search" placeholder="Search ticker, company, or CIK…" autocomplete="off" />
      <select id="formFilter">
        <option value="">All latest forms</option>
        <option value="10-K">10-K</option>
        <option value="10-Q">10-Q</option>
        <option value="8-K">8-K</option>
        <option value="S-1">S-1</option>
      </select>
    </section>

    <section class="summary">
      <span id="countLabel">0 companies</span>
      <span id="updatedLabel">Last sync: unknown</span>
    </section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Company</th>
            <th>CIK</th>
            <th>Latest Form</th>
            <th>Filed</th>
            <th>SEC</th>
          </tr>
        </thead>
        <tbody id="companyTable"></tbody>
      </table>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
