<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEC Stock Research</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>SEC Stock Research</h1>
      <p>Market-style SEC company screener</p>
    </div>
    <nav>
      <a href="index.html" class="active">Stocks</a>
    </nav>
  </header>

  <main class="page">
    <section class="panel hero">
      <div>
        <h2>Search U.S. Public Companies</h2>
        <p>Click a ticker to open its stock detail page with 財報, SEC filings, and news links.</p>
      </div>
      <div class="stats" id="stats">Loading SEC companies…</div>
    </section>

    <section class="panel controls">
      <input id="searchInput" type="search" placeholder="Search ticker, company, or CIK…" autocomplete="off" />
      <select id="limitSelect" aria-label="Rows shown">
        <option value="50">Show 50</option>
        <option value="100" selected>Show 100</option>
        <option value="250">Show 250</option>
        <option value="500">Show 500</option>
      </select>
    </section>

    <section class="panel table-panel">
      <table>
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Company</th>
            <th>CIK</th>
            <th>SEC</th>
          </tr>
        </thead>
        <tbody id="companyRows">
          <tr><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
